##########################################################################
# @file prj.conf
# @brief Various MIDI protocol test with the Zephyr SDK
# @note
# adding in some MIDI1 legacy DIN5 serial.  
#
# Code is based on the original midi-usb sample
#
# @author Jan-Willem Smaal <usenet@gispen.org
# @date 20251220
##########################################################################
CONFIG_LOG=n
CONFIG_LOG_DEFAULT_LEVEL=0

##########################################################################
# Tune these settings to reduce the RAM footprint
##########################################################################
CONFIG_IDLE_STACK_SIZE=128
CONFIG_ISR_STACK_SIZE=1024
# Note this one is under the display and cannot be reduced 
CONFIG_HEAP_MEM_POOL_SIZE=1536

# Let's disable the boot banner because 
# on the FRDM_MCXC242 overlay we use it will go out 
# the MIDI port...  
CONFIG_BOOT_BANNER=y

# Serial port support with IRQ on RX.
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# EOF 
