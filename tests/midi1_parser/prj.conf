# Enable ztest
CONFIG_ZTEST=y

# Enable thread safety for queues
CONFIG_MAIN_STACK_SIZE=2048

# Enable printk (your parser uses it when debug is on)
CONFIG_PRINTK=y

CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n

# Enable minimal UART driver stubs (native_posix)
CONFIG_SERIAL=y

# For the qemu m0
#CONFIG_UART_NRFX=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Disable Zephyr banner for cleaner test output
CONFIG_BOOT_BANNER=n


CONFIG_SERIAL=y
CONFIG_SERIAL_INIT_PRIORITY=50
CONFIG_MIDI1_SERIAL=y
CONFIG_MIDI1_SERIAL_RUNNING_STATUS_REPEAT=16
CONFIG_MIDI1_SERIAL_RUNNING_STATUS_TIMEOUT_MS=300
CONFIG_MIDI1_SERIAL_ISR_MSGQ_SIZE_MS=128
